name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: 1.6.3
  GO_VERSION: 1.21
  APP_CONFIG_PATH: config.json

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      cache_key: ${{ steps.set-cache-key.outputs.cache_key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set cache key
        id: set-cache-key
        run: |
          CACHE_KEY="${{ runner.os }}-dev-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}"
          echo "cache_key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "::notice::Cache key: $CACHE_KEY"

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: dev
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ steps.set-cache-key.outputs.cache_key }}

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install revive
        run: go install github.com/mgechev/revive@latest

      - name: Run revive
        run: revive -config revive.toml -formatter friendly ./...

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: setup
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: dev
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: [setup, lint, validate]
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: dev
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Terraform Plan
        env:
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
        run: terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 65000
              ? planOutput.slice(0, 65000) + '\n\n...(truncated — see full output in the workflow run)'
              : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`dev\`\n\`\`\`\n${truncated}\n\`\`\``
            });
